<div class="col-md-6 col-lg-4">
    <div class="card h-100 category-card">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-start">
                <div class="d-flex align-items-center">
                    <div class="category-icon bg-{{ category.category_color|default:'primary' }} text-white me-3">
                        <i class="bi bi-tag"></i>
                    </div>
                    <div>
                        <h5 class="card-title mb-1">{{ category.name }}</h5>
                        <span class="badge bg-{% if category.type == 'despesa' %}danger{% elif category.type == 'receita' %}success{% else %}info{% endif %}">
                            {% if category.type == 'despesa' %}Despesa
                            {% elif category.type == 'receita' %}Receita
                            {% endif %}
                        </span>
                    </div>
                </div>
                <div class="dropdown">
                    <button class="btn btn-link text-muted p-0" data-bs-toggle="dropdown">
                        <i class="bi bi-three-dots-vertical"></i>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <a class="dropdown-item" href="{% url 'categories:edit' category.id_category %}">
                                <i class="bi bi-pencil me-2"></i>Editar
                            </a>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <a class="dropdown-item text-danger" href="#" 
                               data-bs-toggle="modal" data-bs-target="#deleteModal{{ category.id_category }}">
                                <i class="bi bi-trash me-2"></i>Excluir
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
            
            {% if category.description %}
                <p class="text-muted small mt-2 mb-0">{{ category.description }}</p>
            {% endif %}
        </div>
    </div>
</div>
