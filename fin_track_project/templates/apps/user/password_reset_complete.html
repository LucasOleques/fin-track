{% extends 'base.html' %}
{% load static %}

{% block title %}Senha Atualizada - FinTrack{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card text-center">
        <div class="auth-header">
            <div class="auth-logo text-success">
                <i class="bi bi-check-circle-fill"></i>
            </div>
            <h3>Senha Atualizada!</h3>
        </div>
        
        <div class="mb-4">
            <p class="text-muted">
                Sua senha foi alterada com sucesso. Agora você já pode acessar sua conta com segurança.
            </p>
        </div>
        
        <a href="{% url 'user:login' %}" class="btn btn-primary w-100 btn-lg">
            <i class="bi bi-box-arrow-in-right me-2"></i>Fazer Login
        </a>
    </div>
</div>
{% endblock %}
