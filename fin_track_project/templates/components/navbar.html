{% load static %}
<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
        <a class="navbar-brand" href="{% url 'dashboard' %}">
            <span class="brand-icon"><i class="bi bi-wallet2"></i></span>
            FinTrack
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Abrir menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto gap-1 ms-3">
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}"
                       href="{% url 'dashboard' %}">
                        <i class="bi bi-speedometer2"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if 'accounts' in request.path %}active{% endif %}"
                       href="{% url 'accounts:list' %}">
                        <i class="bi bi-bank"></i>Contas
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if 'transactions' in request.path %}active{% endif %}"
                       href="{% url 'transactions:list' %}">
                        <i class="bi bi-arrow-left-right"></i>Transações
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if 'categories' in request.path %}active{% endif %}"
                       href="{% url 'categories:list' %}">
                        <i class="bi bi-tags"></i>Categorias
                    </a>
                </li>
            </ul>

            <ul class="navbar-nav">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle d-flex align-items-center gap-2"
                       href="#" id="userDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        {% if avatar_base64 %}
                            <img src="data:image/jpeg;base64,{{ avatar_base64 }}"
                                 class="nav-avatar"
                                 style="width:28px;height:28px;border-radius:50%;object-fit:cover;"
                                 alt="Avatar">
                        {% else %}
                            <span class="nav-avatar-placeholder">
                                <i class="bi bi-person-fill"></i>
                            </span>
                        {% endif %}
                        <span>{{ user.first_name|default:user.username }}</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                        <li>
                            <a class="dropdown-item" href="{% url 'user:profile' %}">
                                <i class="bi bi-person me-2"></i>Meu Perfil
                            </a>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <a class="dropdown-item text-danger" href="{% url 'user:logout' %}">
                                <i class="bi bi-box-arrow-right me-2"></i>Sair
                            </a>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>
